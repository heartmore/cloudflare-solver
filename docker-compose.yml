version: "3.8"

services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes: [redis_data:/data]
    restart: unless-stopped

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    ports: ["8191"]
    environment: {LOG_LEVEL: info, HEADLESS: "true"}
    restart: unless-stopped
    deploy: {resources: {limits: {memory: 512M}}}

  solver:
    build: ./solver
    ports: ["8080:8080"]
    environment:
      FLARESOLVERR_URL: http://flaresolverr:8191
      REDIS_URL: redis://redis:6379/0
      PORT: "8080"
      WORKERS: "2"
    depends_on: [redis, flaresolverr]
    restart: unless-stopped
    deploy: {replicas: 2}

volumes:
  redis_data:
